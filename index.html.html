<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singularity Run Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Russo+One&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg-deep: #0a0a1a;
    --bg-card: rgba(17,17,40,0.85);
    --bg-card-hover: rgba(22,22,58,0.9);
    --border: #1e1e4a;
    --border-glow: #7c3aed55;
    --text: #e2e8f0;
    --text-dim: #8888aa;
    --text-bright: #ffffff;
    --accent: #7c3aed;
    --accent-light: #a78bfa;
    --accent-glow: #7c3aed80;
    --cta: #f43f5e;
    --cta-glow: #f43f5e60;
    --gold: #fbbf24;
    --gold-glow: #fbbf2440;
    --green: #22c55e;
    --green-dim: #16a34a;
    --green-glow: #22c55e50;
    --phase-pre: #6366f1;
    --phase-1: #8b5cf6;
    --phase-2: #a855f7;
    --phase-3: #c084fc;
    --phase-4: #e879f9;
    --phase-5: #f43f5e;
    --phase-6: #fb923c;
    --phase-ref: #38bdf8;
    --radius: 10px;
    --glass: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.06);
  }

  /* Animated grid background */
  body {
    font-family: 'Chakra Petch', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    padding: 20px;
    max-width: 960px;
    margin: 0 auto;
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
  }

  /* Perspective grid floor */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glow orbs */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 15% 10%, #7c3aed12 0%, transparent 45%),
      radial-gradient(ellipse at 85% 90%, #f43f5e0a 0%, transparent 45%),
      radial-gradient(ellipse at 50% 50%, #38bdf808 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: ambientShift 20s ease-in-out infinite alternate;
  }

  @keyframes ambientShift {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  /* Scanline overlay */
  #scanlines {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Glitch title */
  .title-block {
    position: relative;
    z-index: 1;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Russo One', 'Chakra Petch', sans-serif;
    font-size: 2rem;
    color: var(--text-bright);
    margin-bottom: 6px;
    text-shadow:
      0 0 10px var(--accent-glow),
      0 0 40px #7c3aed40,
      0 0 80px #7c3aed20;
    letter-spacing: 2px;
    position: relative;
    display: inline-block;
  }
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    overflow: hidden;
  }
  h1::before {
    color: #f43f5e;
    z-index: -1;
    animation: glitch1 3s infinite linear alternate-reverse;
    clip-path: inset(0 0 65% 0);
  }
  h1::after {
    color: #38bdf8;
    z-index: -1;
    animation: glitch2 2.5s infinite linear alternate-reverse;
    clip-path: inset(65% 0 0 0);
  }
  @keyframes glitch1 {
    0%, 92% { transform: translate(0); }
    93% { transform: translate(-3px, 1px); }
    94% { transform: translate(3px, -1px); }
    95% { transform: translate(-2px, 0); }
    96%, 100% { transform: translate(0); }
  }
  @keyframes glitch2 {
    0%, 90% { transform: translate(0); }
    91% { transform: translate(2px, 1px); }
    92% { transform: translate(-2px, -1px); }
    93% { transform: translate(1px, 0); }
    94%, 100% { transform: translate(0); }
  }
  .subtitle {
    font-size: 0.75rem;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    padding-left: 2px;
  }
  .subtitle::before {
    content: '// ';
    color: var(--accent);
    opacity: 0.5;
  }

  /* HUD-style progress bar */
  .progress-bar-container {
    background: var(--bg-card);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 24px;
    position: sticky;
    top: 8px;
    z-index: 100;
    border: 1px solid var(--glass-border);
    box-shadow:
      0 4px 30px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 0 15px rgba(124,58,237,0.1);
  }
  /* HUD corner brackets */
  .progress-bar-container::before,
  .progress-bar-container::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.5;
  }
  .progress-bar-container::before {
    top: -1px; left: -1px;
    border-width: 2px 0 0 2px;
    border-radius: var(--radius) 0 0 0;
  }
  .progress-bar-container::after {
    bottom: -1px; right: -1px;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 var(--radius) 0;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.82rem;
    margin-bottom: 10px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .progress-pct {
    color: var(--accent-light);
    font-weight: 700;
    font-size: 1rem;
    font-family: 'Russo One', sans-serif;
    text-shadow: 0 0 8px var(--accent-glow);
  }
  .progress-track {
    width: 100%;
    height: 10px;
    background: #0d0d2a;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
    border: 1px solid #1a1a3e;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a855f7, var(--cta));
    background-size: 200% 100%;
    animation: gradientScroll 3s linear infinite;
    border-radius: 4px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
    position: relative;
    box-shadow: 0 0 16px var(--accent-glow), 0 0 4px var(--cta-glow);
  }
  @keyframes gradientScroll {
    0% { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    top: 0; right: 0; bottom: 0;
    width: 60px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25));
    border-radius: 4px;
    animation: shimmer 2s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .reset-btn {
    background: transparent;
    color: var(--cta);
    border: 1px solid #f43f5e30;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.7rem;
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .reset-btn::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(244,63,94,0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }
  .reset-btn:hover { border-color: var(--cta); box-shadow: 0 0 20px var(--cta-glow); }
  .reset-btn:hover::before { width: 200px; height: 200px; }

  /* Sections with glassmorphism */
  .section {
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: var(--radius);
    margin-bottom: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
  }
  .section:hover {
    border-color: var(--border-glow);
    box-shadow: 0 0 20px rgba(124,58,237,0.08);
    transform: translateY(-1px);
  }
  /* Left accent bar */
  .section::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    border-radius: 3px 0 0 3px;
  }
  .phase-pre::before { background: linear-gradient(180deg, var(--phase-pre), #4338ca); box-shadow: 0 0 10px var(--phase-pre); }
  .phase-1::before { background: linear-gradient(180deg, var(--phase-1), #6d28d9); box-shadow: 0 0 10px var(--phase-1); }
  .phase-2::before { background: linear-gradient(180deg, var(--phase-2), #7c3aed); box-shadow: 0 0 10px var(--phase-2); }
  .phase-3::before { background: linear-gradient(180deg, var(--phase-3), #a855f7); box-shadow: 0 0 10px var(--phase-3); }
  .phase-4::before { background: linear-gradient(180deg, var(--phase-4), #c026d3); box-shadow: 0 0 10px var(--phase-4); }
  .phase-5::before { background: linear-gradient(180deg, var(--phase-5), #dc2626); box-shadow: 0 0 10px var(--phase-5); }
  .phase-6::before { background: linear-gradient(180deg, var(--phase-6), #ea580c); box-shadow: 0 0 10px var(--phase-6); }
  .phase-ref::before { background: linear-gradient(180deg, var(--phase-ref), #0ea5e9); box-shadow: 0 0 10px var(--phase-ref); }

  /* HUD corner brackets on sections */
  .section::after {
    content: '';
    position: absolute;
    top: 4px; right: 4px;
    width: 12px; height: 12px;
    border-top: 1.5px solid var(--accent);
    border-right: 1.5px solid var(--accent);
    opacity: 0.25;
    transition: opacity 0.3s;
    border-radius: 0 4px 0 0;
    pointer-events: none;
  }
  .section:hover::after { opacity: 0.5; }

  .section-header {
    padding: 14px 20px 14px 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
    transition: background 0.2s;
  }
  .section-header:hover { background: var(--bg-card-hover); }
  .section-arrow {
    font-size: 0.55rem;
    color: var(--accent-light);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    flex-shrink: 0;
    opacity: 0.6;
    filter: drop-shadow(0 0 3px var(--accent-glow));
  }
  .section.collapsed .section-arrow { transform: rotate(-90deg); }
  .section-title {
    font-family: 'Russo One', 'Chakra Petch', sans-serif;
    font-size: 0.92rem;
    font-weight: 400;
    color: var(--text-bright);
    flex-grow: 1;
    letter-spacing: 0.5px;
    text-shadow: 0 0 20px rgba(255,255,255,0.05);
  }
  .section-count {
    font-size: 0.68rem;
    color: var(--text-dim);
    flex-shrink: 0;
    background: rgba(26,26,62,0.8);
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 600;
    font-family: 'Chakra Petch', sans-serif;
    letter-spacing: 0.5px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .section-body {
    padding: 0 20px 16px 22px;
  }
  .section.collapsed .section-body { display: none; }

  /* Neon checkbox system */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    margin: 3px 0;
    border-radius: 8px;
    transition: all 0.25s;
    border: 1px solid transparent;
    position: relative;
  }
  .check-item:hover {
    background: rgba(26,26,58,0.6);
    border-color: rgba(255,255,255,0.04);
  }
  .check-item.checked { opacity: 0.4; }
  .check-item.checked .check-label {
    text-decoration: line-through;
    text-decoration-color: var(--accent);
    text-decoration-thickness: 1.5px;
  }

  .check-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    cursor: pointer;
    margin-top: 1px;
    position: relative;
    transition: all 0.25s;
    background: rgba(124,58,237,0.05);
  }
  .check-item input[type="checkbox"]:hover {
    border-color: var(--accent-light);
    box-shadow: 0 0 12px var(--accent-glow), inset 0 0 8px rgba(124,58,237,0.1);
  }
  .check-item input[type="checkbox"]:checked {
    background: var(--accent);
    border-color: var(--accent-light);
    box-shadow: 0 0 14px var(--accent-glow), 0 0 4px var(--accent);
    animation: checkPulse 0.4s ease-out;
  }
  @keyframes checkPulse {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 20px 4px var(--accent-glow); }
    100% { box-shadow: 0 0 14px var(--accent-glow), 0 0 4px var(--accent); }
  }
  .check-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 5px; top: 1px;
    width: 6px;
    height: 11px;
    border: solid var(--text-bright);
    border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
    filter: drop-shadow(0 0 2px white);
  }
  .check-item input[type="checkbox"]:focus-visible {
    outline: 2px solid var(--accent-light);
    outline-offset: 2px;
  }
  .check-label {
    font-size: 0.88rem;
    line-height: 1.5;
    cursor: pointer;
    color: var(--text);
  }
  .check-label strong {
    color: var(--text-bright);
    font-weight: 600;
    text-shadow: 0 0 12px rgba(255,255,255,0.06);
  }

  /* Gold highlight for game-changers */
  b.hl {
    color: var(--gold);
    font-weight: 700;
    text-shadow: 0 0 10px var(--gold-glow), 0 0 20px rgba(251,191,36,0.15);
    padding: 0 2px;
  }

  /* Detail text with terminal feel */
  .detail {
    font-size: 0.78rem;
    color: var(--text-dim);
    padding: 6px 0 8px 46px;
    line-height: 1.55;
    border-left: 2px solid #1e1e4a;
    margin-left: 24px;
    padding-left: 14px;
    position: relative;
  }
  .detail::before {
    content: '>';
    position: absolute;
    left: 4px;
    top: 6px;
    color: var(--accent);
    opacity: 0.3;
    font-family: monospace;
    font-size: 0.7rem;
  }

  /* Tip Items with glow */
  .tip-item {
    font-size: 0.84rem;
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    border-left: 3px solid var(--phase-ref);
    background: rgba(13,21,48,0.7);
    line-height: 1.55;
    transition: all 0.2s;
    position: relative;
  }
  .tip-item:hover {
    background: rgba(13,21,48,0.9);
    box-shadow: -3px 0 12px rgba(56,189,248,0.1);
  }
  .tip-item strong { color: var(--accent-light); }

  /* Method Toggle - enhanced */
  .method-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    padding: 4px;
    background: rgba(10,10,32,0.8);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .method-btn {
    flex: 1;
    padding: 9px 14px;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Chakra Petch', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    transition: all 0.25s;
    letter-spacing: 0.5px;
    position: relative;
  }
  .method-btn:hover { color: var(--text); background: rgba(26,26,58,0.5); }
  .method-btn.active {
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: var(--text-bright);
    box-shadow: 0 0 16px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.1);
    text-shadow: 0 0 8px rgba(255,255,255,0.3);
  }
  .method-content { display: none; }
  .method-content.active { display: block; }

  /* Section completion badge - neon green */
  .section-done {
    font-size: 0.6rem;
    color: var(--green);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    text-shadow: 0 0 8px var(--green-glow), 0 0 16px rgba(34,197,94,0.2);
    margin-right: 6px;
    padding: 2px 8px;
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 4px;
    background: rgba(34,197,94,0.05);
    animation: donePulse 2s ease-in-out infinite;
  }
  @keyframes donePulse {
    0%, 100% { box-shadow: 0 0 4px var(--green-glow); }
    50% { box-shadow: 0 0 12px var(--green-glow); }
  }

  /* Footer attribution */
  .footer {
    text-align: center;
    padding: 30px 0 10px;
    font-size: 0.65rem;
    color: #444466;
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .footer::before {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 12px;
    opacity: 0.3;
  }

  /* Responsive */
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 1.5rem; letter-spacing: 1px; }
    .subtitle { letter-spacing: 2px; font-size: 0.65rem; }
    .section-title { font-size: 0.82rem; }
    .check-label { font-size: 0.82rem; }
    .detail { padding-left: 10px; margin-left: 16px; }
    .detail::before { display: none; }
    .method-toggle { flex-direction: column; }
    .progress-bar-container { top: 4px; padding: 12px 14px; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
    }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: #2a2a5a; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

  /* Fade-in animation for sections */
  .section {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeSlideIn 0.4s ease-out forwards;
  }
  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.1s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.2s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.3s; }
  .section:nth-child(7) { animation-delay: 0.35s; }
  .section:nth-child(8) { animation-delay: 0.4s; }
  .section:nth-child(9) { animation-delay: 0.45s; }
  .section:nth-child(10) { animation-delay: 0.5s; }
  .section:nth-child(11) { animation-delay: 0.55s; }
  @keyframes fadeSlideIn {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="scanlines"></div>

<div class="title-block">
  <h1 data-text="Singularity Run Checklist">Singularity Run Checklist</h1>
  <div class="subtitle">Garden Incremental -- Optimization Framework</div>
</div>

<div class="progress-bar-container">
  <div class="progress-label">
    <span id="progressText">0 / 0 steps</span>
    <span>
      <span class="progress-pct" id="progressPct">0%</span>
      <button class="reset-btn" onclick="resetAll()">Reset Run</button>
    </span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<div id="sections"></div>

<div class="footer">Garden Incremental -- Singularity Optimization v3</div>

<script>
const DATA = [
  {
    title: "Phase 0: Pre-Garden Prep",
    cls: "phase-pre",
    items: [
      { id: "pre_1", text: "Max <strong>Cosmic Rank/Rarity</strong> as high as possible.", detail: "Cosmic Rank doesn't reset until you disconnect. Keeping it lets you open the first 5 Space runes immediately on the next run." },
      { id: "pre_2", text: "Get <strong>Computer upgrades</strong> up to the point of needing Strawberries.", detail: "PC tier gives xRL, xRB, xCores, xNeptunite, xPlutite. Get it as far as you can before Garden." },
      { id: "pre_3a", text: "<strong>Perks: Mushroom</strong> -- 5 reinc at a time after energy upgrades.", detail: "Only Mine perks and 'keep first 3 world' perks appear here. Grind 5x reinc, grab 5 perks, skip reinc." },

const STORAGE_KEY = "singularity_checklist_v3";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function countSectionChecked(section, state) {
  let total = 0, checked = 0;
  if (section.isTips) return { total: 0, checked: 0 };
  if (section.hasMethodToggle) {
    Object.values(section.methods).forEach(m => {
      m.items.forEach(item => { total++; if (state[item.id]) checked++; });
    });
  } else if (section.items) {
    section.items.forEach(item => { total++; if (state[item.id]) checked++; });
  }
  return { total, checked };
}

function updateProgress() {
  const boxes = document.querySelectorAll('.check-item input[type="checkbox"]');
  const total = boxes.length;
  const checked = [...boxes].filter(b => b.checked).length;
  const pct = total ? (checked/total*100).toFixed(1) : 0;
  document.getElementById('progressText').textContent = `${checked} / ${total} steps`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  // Update per-section counts
  const state = loadState();
  DATA.forEach((section, si) => {
    const sc = countSectionChecked(section, state);
    const countEl = document.querySelector(`#sec_${si} .section-count`);
    const doneEl = document.querySelector(`#sec_${si} .section-done`);
    if (countEl && sc.total > 0) {
      countEl.textContent = `${sc.checked} / ${sc.total}`;
      if (doneEl) doneEl.style.display = (sc.checked === sc.total && sc.total > 0) ? 'inline' : 'none';
    }
  });
}

function resetAll() {
  if (!confirm('Reset run checkboxes? Singularity Milestones will be preserved.')) return;
  const old = loadState();
  const kept = {};
  Object.keys(old).forEach(k => { if (k.startsWith('sing_')) kept[k] = old[k]; });
  saveState(kept);
  document.querySelectorAll('.check-item input[type="checkbox"]').forEach(cb => {
    if (cb.id.startsWith('sing_')) return;
    cb.checked = false;
    cb.closest('.check-item').classList.remove('checked');
  });
  updateProgress();
}

function buildCheckItem(item, state) {
  const checked = state[item.id] || false;
  let html = `<div class="check-item ${checked ? 'checked' : ''}">
    <input type="checkbox" id="${item.id}" ${checked ? 'checked' : ''}>
    <label class="check-label" for="${item.id}">${item.text}</label>
  </div>`;
  if (item.detail) {
    html += `<div class="detail">${item.detail}</div>`;
  }
  return html;
}

function render() {
  const state = loadState();
  const container = document.getElementById('sections');
  let html = '';

  DATA.forEach((section, si) => {
    const sc = countSectionChecked(section, state);
    html += `<div class="section ${section.cls}" id="sec_${si}">`;
    html += `<div class="section-header" onclick="toggleSection(${si})">`;
    html += `<span class="section-arrow">&#9660;</span>`;
    html += `<span class="section-title">${section.title}</span>`;
    if (sc.total > 0) {
      const allDone = sc.checked === sc.total;
      html += `<span class="section-done" style="display:${allDone ? 'inline' : 'none'}">DONE</span>`;
      html += `<span class="section-count">${sc.checked} / ${sc.total}</span>`;
    } else if (section.isTips) {
      html += `<span class="section-count">${section.tips.length} notes</span>`;
    }
    html += `</div>`;
    html += `<div class="section-body">`;

    if (section.isTips) {
      section.tips.forEach(t => {
        html += `<div class="tip-item">${t}</div>`;
      });
    } else if (section.hasMethodToggle) {
      html += `<div class="method-toggle">`;
      html += `<button class="method-btn active" onclick="switchMethod(${si}, 'method1', this)">Method 1 (Recommended)</button>`;
      html += `<button class="method-btn" onclick="switchMethod(${si}, 'method2', this)">Method 2 (Alt)</button>`;
      html += `</div>`;
      html += `<div class="method-content active" id="sec_${si}_method1">`;
      section.methods.method1.items.forEach(item => { html += buildCheckItem(item, state); });
      html += `</div>`;
      html += `<div class="method-content" id="sec_${si}_method2">`;
      section.methods.method2.items.forEach(item => { html += buildCheckItem(item, state); });
      html += `</div>`;
    } else {
      section.items.forEach(item => { html += buildCheckItem(item, state); });
    }

    html += `</div></div>`;
  });

  container.innerHTML = html;

  document.querySelectorAll('.check-item input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', function() {
      const st = loadState();
      st[this.id] = this.checked;
      saveState(st);
      this.closest('.check-item').classList.toggle('checked', this.checked);
      updateProgress();
    });
  });

  updateProgress();
}

function toggleSection(idx) {
  document.getElementById(`sec_${idx}`).classList.toggle('collapsed');
}

function switchMethod(secIdx, method, btn) {
  const parent = btn.closest('.section-body');
  parent.querySelectorAll('.method-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  parent.querySelectorAll('.method-content').forEach(mc => mc.classList.remove('active'));
  document.getElementById(`sec_${secIdx}_${method}`).classList.add('active');
  updateProgress();
}

render();
</script>
</body>
</html>
